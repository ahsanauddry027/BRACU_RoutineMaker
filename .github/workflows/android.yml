name: Build Android APK

# Builds a debug APK in the cloud and uploads it as a downloadable artifact.
# Trigger manually from the Actions tab (Run workflow), or on push to main.
#
# Requires one repository secret:
#   VITE_API_URL = your deployed backend URL, e.g. https://bracu-routine.onrender.com
# (Settings → Secrets and variables → Actions → New repository secret)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install dependencies
        run: npm install

      - name: Build web app
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bracu-routine-apk
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
